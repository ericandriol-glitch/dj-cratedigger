name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,discovery,streaming,fingerprint,watch]"

      - name: Lint with ruff
        run: ruff check cratedigger/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Type check
        run: mypy cratedigger/ --ignore-missing-imports
        continue-on-error: true
